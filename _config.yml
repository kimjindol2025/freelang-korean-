# GitHub Pages Configuration for K-FreeLang

title: K-FreeLang v1.0
description: 한국 개발자를 위한 완전한 프로그래밍 언어
url: https://kimjindol2025.github.io/freelang-korean
baseurl: /freelang-korean

# Theme
theme: null

# Layout
layouts_dir: _layouts
includes_dir: _includes

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Exclude
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - src/
  - .git
  - .gitignore
  - CHANGELOG.md
  - CONTRIBUTING.md

# Plugins
plugins:
  - jekyll-sitemap

# Defaults
defaults:
  - scope:
      path: "docs"
    values:
      layout: "default"
      lang: "ko"

# Analytics (선택)
# google_analytics: UA-XXXXXXXXX-X
